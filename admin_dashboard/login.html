<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ — Bus Tracking Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      position: relative;
      overflow: hidden;
    }

    /* Animated background dots */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(59,130,246,0.12) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(99,102,241,0.10) 0%, transparent 50%);
      pointer-events: none;
    }

    .login-card {
      background: rgba(255,255,255,0.97);
      border-radius: 20px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.1);
      width: 100%; max-width: 420px;
      overflow: hidden;
      animation: cardIn 0.4s ease;
    }

    @keyframes cardIn {
      from { transform: translateY(30px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    /* Header */
    .login-header {
      background: linear-gradient(135deg, #1e40af, #3b82f6);
      padding: 36px 32px 32px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .login-header::after {
      content: '';
      position: absolute;
      bottom: -20px; left: 50%;
      transform: translateX(-50%);
      width: 120%; height: 40px;
      background: rgba(255,255,255,0.97);
      border-radius: 50%;
    }

    .logo-wrap {
      width: 72px; height: 72px;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      margin: 0 auto 16px;
      border: 2px solid rgba(255,255,255,0.3);
      backdrop-filter: blur(4px);
    }

    .login-header h1 {
      color: #fff;
      font-size: 20px; font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }

    .login-header p {
      color: rgba(255,255,255,0.75);
      font-size: 13px;
    }

    /* Body */
    .login-body { padding: 36px 32px 32px; }

    .section-title {
      font-size: 14px; font-weight: 700;
      color: #1e293b;
      margin-bottom: 24px;
      text-align: center;
    }

    .form-group { margin-bottom: 16px; }

    .form-label {
      display: block;
      font-size: 12.5px; font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }

    .input-wrap { position: relative; }

    .input-icon {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%);
      font-size: 16px; pointer-events: none;
    }

    .form-input {
      width: 100%;
      padding: 11px 12px 11px 38px;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      font-size: 14px; color: #1f2937;
      background: #f9fafb;
      outline: none;
      font-family: inherit;
      transition: all 0.15s;
    }

    .form-input:focus {
      border-color: #3b82f6;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
    }

    .form-input.has-toggle { padding-right: 42px; }

    .toggle-pw {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer; font-size: 16px;
      color: #9ca3af;
      padding: 4px;
      transition: color 0.15s;
    }
    .toggle-pw:hover { color: #6b7280; }

    /* Error message */
    .error-msg {
      display: none;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px; color: #dc2626;
      margin-bottom: 16px;
      align-items: center; gap: 8px;
    }
    .error-msg.show { display: flex; animation: shake 0.4s ease; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60%  { transform: translateX(-5px); }
      40%,80%  { transform: translateX(5px); }
    }

    /* Submit button */
    .btn-login {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #1d4ed8, #3b82f6);
      color: #fff;
      border: none; border-radius: 10px;
      font-size: 15px; font-weight: 700;
      cursor: pointer; font-family: inherit;
      transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 4px;
      box-shadow: 0 4px 14px rgba(59,130,246,0.35);
    }

    .btn-login:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(59,130,246,0.45);
    }

    .btn-login:active:not(:disabled) { transform: translateY(0); }

    .btn-login:disabled {
      opacity: 0.7; cursor: not-allowed; transform: none;
    }

    /* Spinner inside button */
    .btn-spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .btn-spinner.show { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer */
    .login-footer {
      text-align: center;
      padding: 0 32px 24px;
      font-size: 12px; color: #9ca3af;
      line-height: 1.8;
    }

    .login-footer strong { color: #6b7280; }

    .hint-box {
      background: #f0fdf4;
      border: 1px solid #86efac;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px; color: #166534;
      text-align: left; margin-bottom: 16px;
      line-height: 1.7;
    }
  </style>
</head>
<body>

  <div class="login-card">

    <!-- Header -->
    <div class="login-header">
      <div class="logo-wrap">🚌</div>
      <h1>Bus Tracking System</h1>
      <p>ระบบติดตามรถโดยสาร — Admin Portal</p>
    </div>

    <!-- Body -->
    <div class="login-body">
      <p class="section-title">🔐 เข้าสู่ระบบผู้ดูแล</p>

      <!-- Error -->
      <div class="error-msg" id="errorMsg">
        <span>⚠️</span>
        <span id="errorText">ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง</span>
      </div>

      <!-- Form -->
      <form id="loginForm" onsubmit="doLogin(event)" novalidate>

        <div class="form-group">
          <label class="form-label">ชื่อผู้ใช้ / Username</label>
          <div class="input-wrap">
            <span class="input-icon">👤</span>
            <input type="text" id="identifier" class="form-input"
              placeholder="username หรือ email" required autocomplete="username">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">รหัสผ่าน</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="password" class="form-input has-toggle"
              placeholder="••••••••" required autocomplete="current-password">
            <button type="button" class="toggle-pw" id="togglePw" onclick="togglePassword()">👁️</button>
          </div>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
          <div class="btn-spinner" id="btnSpinner"></div>
          <span id="btnText">เข้าสู่ระบบ →</span>
        </button>

      </form>
    </div>

    <!-- Footer -->
    <div class="login-footer">
      <strong>Bus Tracking Admin Dashboard</strong><br>
      เฉพาะผู้ดูแลระบบที่ได้รับอนุญาตเท่านั้น
    </div>

  </div>

  <script>
    const API = 'https://bus-tracking-worker.thanachot-jo888.workers.dev';

    // Check if already logged in
    if (localStorage.getItem('admin_token')) {
      window.location.href = 'dashboard.html';
    }

    function togglePassword() {
      const pw = document.getElementById('password');
      const btn = document.getElementById('togglePw');
      if (pw.type === 'password') {
        pw.type = 'text'; btn.textContent = '🙈';
      } else {
        pw.type = 'password'; btn.textContent = '👁️';
      }
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      document.getElementById('errorText').textContent = msg;
      el.classList.add('show');
    }

    function hideError() {
      document.getElementById('errorMsg').classList.remove('show');
    }

    function setLoading(on) {
      const btn = document.getElementById('loginBtn');
      const spinner = document.getElementById('btnSpinner');
      const text = document.getElementById('btnText');
      btn.disabled = on;
      spinner.classList.toggle('show', on);
      text.textContent = on ? 'กำลังเข้าสู่ระบบ...' : 'เข้าสู่ระบบ →';
    }

    async function doLogin(e) {
      e.preventDefault();
      hideError();

      const identifier = document.getElementById('identifier').value.trim();
      const password   = document.getElementById('password').value;

      if (!identifier || !password) {
        showError('กรุณากรอกชื่อผู้ใช้และรหัสผ่าน');
        return;
      }

      setLoading(true);

      try {
        const res = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ identifier, password, expectedRole: 'admin' })
        });

        const data = await res.json();

        if (!res.ok) {
          const msg = data?.message || data?.error || 'เข้าสู่ระบบไม่สำเร็จ';
          showError(msg);
          setLoading(false);
          return;
        }

        // Extract token from various response shapes
        const token = data?.token || data?.data?.token || data?.accessToken ||
                      data?.data?.accessToken || data?.access_token;

        if (!token) {
          showError('ไม่พบ token จากเซิร์ฟเวอร์ กรุณาตรวจสอบสิทธิ์ของบัญชี');
          setLoading(false);
          return;
        }

        localStorage.setItem('admin_token', token);

        // Save user info if available
        const user = data?.user || data?.data?.user || data?.profile || data?.data;
        if (user && typeof user === 'object') {
          localStorage.setItem('admin_user', JSON.stringify(user));
        }

        // Redirect
        window.location.href = 'dashboard.html';

      } catch (err) {
        showError('เชื่อมต่อเซิร์ฟเวอร์ไม่ได้ กรุณาตรวจสอบอินเทอร์เน็ต');
        setLoading(false);
      }
    }

    // Focus first field
    document.getElementById('identifier').focus();
  </script>

</body>
</html>
