<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — Bus Tracking System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>

<div class="layout">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar" id="sidebar">

    <div class="sidebar-logo">
      <div class="logo-icon">🚌</div>
      <div>
        <div class="logo-text">Bus Tracking</div>
        <div class="logo-sub">Admin Dashboard</div>
      </div>
    </div>

    <nav class="sidebar-nav">

      <div class="nav-group">
        <div class="nav-group-label">ภาพรวม</div>
        <button class="nav-item active" data-section="dashboard" onclick="navigate('dashboard')">
          <span class="nav-icon">📊</span><span>Dashboard</span>
        </button>
        <button class="nav-item" data-section="analytics" onclick="navigate('analytics')">
          <span class="nav-icon">📈</span><span>Analytics</span>
        </button>
      </div>

      <div class="nav-group">
        <div class="nav-group-label">บัญชีผู้ใช้</div>
        <button class="nav-item" data-section="users" onclick="navigate('users')">
          <span class="nav-icon">👥</span><span>ผู้ใช้งาน</span>
        </button>
        <button class="nav-item" data-section="drivers" onclick="navigate('drivers')">
          <span class="nav-icon">🚌</span><span>คนขับรถ</span>
        </button>
        <button class="nav-item" data-section="admins" onclick="navigate('admins')">
          <span class="nav-icon">👤</span><span>ผู้ดูแลระบบ</span>
        </button>
      </div>

      <div class="nav-group">
        <div class="nav-group-label">การเดินรถ</div>
        <button class="nav-item" data-section="routes" onclick="navigate('routes')">
          <span class="nav-icon">🛣️</span><span>เส้นทางรถ</span>
        </button>
        <button class="nav-item" data-section="buses" onclick="navigate('buses')">
          <span class="nav-icon">🚍</span><span>รถโดยสาร</span>
        </button>
        <button class="nav-item" data-section="waiting" onclick="navigate('waiting')">
          <span class="nav-icon">⏳</span><span>รายการรอรับ</span>
        </button>
      </div>

      <div class="nav-group">
        <div class="nav-group-label">การตั้งค่า</div>
        <button class="nav-item" data-section="routeAdmins" onclick="navigate('routeAdmins')">
          <span class="nav-icon">🔗</span><span>มอบหมายเส้นทาง</span>
        </button>
        <button class="nav-item" data-section="settings" onclick="navigate('settings')">
          <span class="nav-icon">⚙️</span><span>การตั้งค่า API</span>
        </button>
      </div>

    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-avatar" id="userAvatar">A</div>
        <div class="user-info">
          <div class="user-name" id="userName">Admin</div>
          <div class="user-role" id="userRole">admin</div>
        </div>
      </div>
    </div>

  </aside>

  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <!-- ===== MAIN ===== -->
  <div class="main">

    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()" aria-label="เปิดเมนู">
          <span></span><span></span><span></span>
        </button>
        <div>
          <div class="page-title" id="pageTitle">📊 Dashboard</div>
          <div class="page-subtitle" id="pageSubtitle">ภาพรวมระบบ Bus Tracking</div>
        </div>
      </div>
      <div class="topbar-right">
        <div class="health-badge" id="healthBadge" style="display:none">
          <span class="health-dot"></span> <span class="health-text">ระบบออนไลน์</span>
        </div>
        <button class="btn-logout" onclick="logout()">🚪 <span class="logout-text">ออกจากระบบ</span></button>
      </div>
    </header>

    <!-- Content -->
    <main class="content" id="mainContent">
      <div class="loading"><div class="spinner"></div> กำลังโหลด...</div>
    </main>

  </div><!-- end .main -->
</div><!-- end .layout -->

<!-- ===== CRUD MODAL ===== -->
<div class="modal-overlay hidden" id="crudModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">เพิ่มรายการ</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <form id="modalForm" onsubmit="return false">
        <div id="modalBody"></div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">ยกเลิก</button>
      <button class="btn btn-primary" id="modalSubmitBtn" onclick="submitModal()">💾 บันทึก</button>
    </div>
  </div>
</div>

<!-- ===== CONFIRM DELETE MODAL ===== -->
<div class="modal-overlay hidden" id="confirmModal">
  <div class="modal modal-sm">
    <div class="confirm-body">
      <div class="confirm-icon">🗑️</div>
      <h3>ยืนยันการลบ</h3>
      <p id="confirmText">คุณต้องการลบรายการนี้ใช่หรือไม่?</p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeConfirm()">ยกเลิก</button>
      <button class="btn btn-danger" id="confirmDeleteBtn" onclick="executeDelete()">🗑️ ยืนยันการลบ</button>
    </div>
  </div>
</div>

<!-- ===== TOAST ===== -->
<div id="toastContainer"></div>

<script type="module" src="script.js"></script>
</body>
</html>
