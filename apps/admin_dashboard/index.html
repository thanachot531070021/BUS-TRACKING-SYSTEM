<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — Bus Tracking System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    /* ===== SEARCHABLE SELECT (async) ===== */
    .ss-container { position: relative; }
    .ss-trigger {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 11px; border: 1.5px solid var(--border); border-radius: var(--r-md);
      background: var(--card); cursor: pointer; user-select: none; min-height: 38px;
      transition: border-color .14s, box-shadow .14s; font-size: 13.5px;
      font-family: inherit; color: var(--text);
    }
    .ss-trigger:hover { border-color: var(--primary); }
    .ss-container.open .ss-trigger { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-ring); }
    .ss-trigger-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; letter-spacing: -0.01em; }
    .ss-trigger-label.ph { color: #a8b9cc; }
    .ss-trigger-arrow { color: var(--muted); font-size: 10px; margin-left: 6px; transition: transform .18s; flex-shrink: 0; }
    .ss-container.open .ss-trigger-arrow { transform: rotate(180deg); }
    .ss-panel {
      position: absolute; top: calc(100% + 4px); left: 0; right: 0; z-index: 9999;
      background: var(--card); border: 1.5px solid var(--primary); border-radius: var(--r-md);
      box-shadow: var(--shadow-md); display: none; overflow: hidden;
    }
    .ss-container.open .ss-panel { display: block; }
    .ss-search-input {
      width: 100%; padding: 8px 11px; border: none; border-bottom: 1px solid var(--border);
      background: var(--bg); font-size: 13px; outline: none; box-sizing: border-box;
      font-family: inherit; color: var(--text);
    }
    .ss-search-input:focus { background: var(--card); }
    .ss-options-list { max-height: 210px; overflow-y: auto; }
    .ss-option {
      padding: 8px 11px; font-size: 13px; cursor: pointer;
      transition: background .1s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: var(--text-2); letter-spacing: -0.01em;
    }
    .ss-option:hover { background: var(--primary-pale); color: var(--text); }
    .ss-option.selected { background: #eef2ff; color: var(--primary); font-weight: 600; }
    .ss-option.ss-hidden { display: none; }
    .ss-no-results { padding: 12px; text-align: center; color: var(--muted); font-size: 13px; }
    .ss-loading-opt { padding: 12px; text-align: center; color: var(--muted); font-size: 13px; }

    /* ===== PAGINATION ===== */
    .pg-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; border-top: 1px solid var(--border);
      background: #fafbfd; flex-wrap: wrap; gap: 8px;
      border-radius: 0 0 var(--r-lg) var(--r-lg);
    }
    .pg-info { font-size: 12.5px; color: var(--muted); letter-spacing: -0.01em; }
    .pg-controls { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
    .pg-size {
      padding: 4px 8px; border: 1.5px solid var(--border); border-radius: var(--r);
      background: var(--card); font-size: 12.5px; cursor: pointer; outline: none;
      font-family: inherit; color: var(--text);
    }
    .pg-size:focus { border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-ring); }
    .pg-btn {
      padding: 4px 10px; border: 1.5px solid var(--border); border-radius: var(--r);
      background: var(--card); cursor: pointer; font-size: 12.5px; line-height: 1.5;
      transition: all .14s; color: var(--text-2); font-family: inherit;
    }
    .pg-btn:hover:not(:disabled) { background: #eef2ff; border-color: var(--primary); color: var(--primary); }
    .pg-btn:disabled { opacity: .4; cursor: not-allowed; }
    .pg-cur { font-size: 12.5px; color: var(--text); font-weight: 600; padding: 0 4px; }

    /* ===== APP LOADER ===== */
    #appLoader {
      position: fixed; inset: 0; z-index: 99999;
      background: var(--bg, #f4f6fb);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
    }
    #appLoader .loader-icon {
      width: 52px; height: 52px;
      background: var(--primary, #6366f1);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 24px rgba(99,102,241,.35);
      animation: loaderPulse 1.2s ease-in-out infinite;
    }
    @keyframes loaderPulse {
      0%,100% { transform: scale(1); box-shadow: 0 8px 24px rgba(99,102,241,.35); }
      50%      { transform: scale(1.06); box-shadow: 0 12px 32px rgba(99,102,241,.5); }
    }
    #appLoader .loader-text {
      font-size: 13.5px; color: var(--muted, #607080); font-weight: 500;
      font-family: 'Inter', system-ui, sans-serif;
      letter-spacing: -0.01em;
    }
    #appLoader.hidden { display: none; }
  </style>
</head>
<body>

<div id="appLoader">
  <div class="loader-icon">
    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"
         fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 3v5h-7V8z"/>
      <circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>
    </svg>
  </div>
  <div class="loader-text">กำลังโหลด...</div>
</div>

<div class="layout">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar" id="sidebar">

    <div class="sidebar-logo">
      <div class="logo-tile">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
             fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 6v6"/><path d="M15 6v6"/>
          <path d="M2 12h19.6"/>
          <path d="M18 18h3s.5-1.7.8-2.8c.1-.4.2-.8.2-1.2 0-.4-.1-.8-.2-1.2l-1.4-5C20.1 6.8 19.1 6 18 6H4a2 2 0 0 0-2 2v10h3"/>
          <circle cx="7" cy="18" r="2"/>
          <path d="M9 18h5"/>
          <circle cx="16" cy="18" r="2"/>
        </svg>
      </div>
      <div class="logo-text-wrap">
        <span class="logo-name">Bus Tracking</span>
        <span class="logo-sub">Admin · v2</span>
      </div>
      <button class="sidebar-collapse-btn" id="collapseBtn" onclick="toggleCollapse()" title="ย่อแถบเมนู">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <path d="M9 3v18"/>
          <path d="m16 15-3-3 3-3"/>
        </svg>
      </button>
    </div>

    <nav class="sidebar-nav" id="sidebarNav"></nav>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-avatar" id="userAvatar">A</div>
        <div class="user-info">
          <div class="user-name" id="userName">Admin</div>
          <div class="user-role" id="userRole">admin</div>
        </div>
      </div>
    </div>

  </aside>

  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <!-- ===== MAIN ===== -->
  <div class="main">

    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()" aria-label="เปิดเมนู">
          <span></span><span></span><span></span>
        </button>
        <div class="topbar-page-tile" id="topbarPageTile">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="9" rx="1"/>
            <rect x="14" y="3" width="7" height="5" rx="1"/>
            <rect x="14" y="12" width="7" height="9" rx="1"/>
            <rect x="3" y="16" width="7" height="5" rx="1"/>
          </svg>
        </div>
        <div style="min-width:0">
          <div class="page-title" id="pageTitle">Dashboard</div>
          <div class="page-subtitle" id="pageSubtitle">ภาพรวมระบบ Bus Tracking</div>
        </div>
      </div>
      <div class="topbar-right">
        <div class="health-pill" id="healthBadge">
          <span class="health-dot"></span>
          <span class="health-text">ระบบออนไลน์</span>
        </div>
        <button class="topbar-icon-btn" title="การแจ้งเตือน">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/>
            <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>
          </svg>
        </button>
        <button class="btn btn-secondary" onclick="logout()">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          <span class="logout-text">ออกจากระบบ</span>
        </button>
      </div>
    </header>

    <!-- Content -->
    <main class="content" id="mainContent">
      <div class="loading"><div class="spinner"></div> กำลังโหลด...</div>
    </main>

  </div><!-- end .main -->
</div><!-- end .layout -->

<!-- ===== CRUD MODAL ===== -->
<div class="modal-overlay hidden" id="crudModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">เพิ่มรายการ</div>
      <button class="modal-close" onclick="closeModal()" aria-label="ปิด">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="modal-body">
      <form id="modalForm" onsubmit="return false">
        <div id="modalBody"></div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">ยกเลิก</button>
      <button class="btn btn-primary" id="modalSubmitBtn" onclick="submitModal()">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        บันทึก
      </button>
    </div>
  </div>
</div>

<!-- ===== CONFIRM DELETE MODAL ===== -->
<div class="modal-overlay hidden" id="confirmModal">
  <div class="modal modal-sm">
    <div class="confirm-body">
      <div class="confirm-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          <path d="M10 11v6"/><path d="M14 11v6"/>
          <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
        </svg>
      </div>
      <h3>ยืนยันการลบ</h3>
      <p id="confirmText">คุณต้องการลบรายการนี้ใช่หรือไม่?</p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeConfirm()">ยกเลิก</button>
      <button class="btn btn-danger" id="confirmDeleteBtn" onclick="executeDelete()">ลบรายการ</button>
    </div>
  </div>
</div>

<!-- ===== TOAST ===== -->
<div id="toastContainer"></div>

<!-- ===== WAYPOINT EDITOR OVERLAY ===== -->
<div id="wpOverlay" style="display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.55);align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:16px;width:min(96vw,900px);height:min(92vh,700px);display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.3)">
    <!-- Header -->
    <div style="padding:16px 20px;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;gap:12px">
      <span style="font-size:20px">🗺️</span>
      <div style="flex:1">
        <div id="wpTitle" style="font-weight:700;font-size:15px;color:#0f172a"></div>
        <div id="wpMeta" style="font-size:12px;color:#6b7280;margin-top:2px"></div>
      </div>
      <button onclick="closeWaypointEditor()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#6b7280;line-height:1">✕</button>
    </div>
    <!-- Instructions bar -->
    <div style="background:#eff6ff;border-bottom:1px solid #bfdbfe;padding:8px 20px;font-size:12px;color:#1e40af;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <span>📍</span>
      <span><strong>คลิกบนแผนที่</strong> เพื่อวางจุดหลัก · <strong>คลิกที่ marker</strong> เพื่อลบ · กด <strong>"จับเส้นตามถนน"</strong> ให้ Google วาดเส้นให้อัตโนมัติ</span>
      <span id="wpSnapStatus" style="margin-left:auto;font-weight:600"></span>
    </div>
    <!-- Map — explicit height so Google Maps can render -->
    <div id="wpMap" style="flex:1;height:0;min-height:0;position:relative"></div>
    <!-- Footer -->
    <div style="padding:12px 20px;border-top:1px solid #e5e7eb;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <button onclick="wpUndo()" class="btn btn-secondary btn-sm">↩ Undo</button>
      <button onclick="wpClear()" class="btn btn-danger btn-sm">🗑 ล้างทั้งหมด</button>
      <button onclick="wpSnapToRoads()" class="btn btn-sm" id="wpSnapBtn" style="background:#10b981;color:#fff;border:none">🚗 จับเส้นตามถนน</button>
      <button onclick="wpLocateMe()" class="btn btn-secondary btn-sm" id="wpLocateBtn">📍 ตำแหน่งของฉัน</button>
      <div style="flex:1"></div>
      <span id="wpPointCount" style="font-size:12px;color:#6b7280"></span>
      <button onclick="closeWaypointEditor()" class="btn btn-secondary">ยกเลิก</button>
      <button onclick="wpSave()" class="btn btn-primary" id="wpSaveBtn">💾 บันทึกเส้นทาง</button>
    </div>
  </div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
