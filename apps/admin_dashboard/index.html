<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — Bus Tracking System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <style>
    /* ===== SEARCHABLE SELECT (async) ===== */
    .ss-container { position: relative; }
    .ss-trigger {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 12px; border: 1.5px solid var(--border); border-radius: var(--radius);
      background: #fff; cursor: pointer; user-select: none; min-height: 40px;
      transition: border-color .2s, box-shadow .2s; font-size: 14px;
    }
    .ss-trigger:hover { border-color: var(--primary); }
    .ss-container.open .ss-trigger { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59,130,246,.12); }
    .ss-trigger-label { flex: 1; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ss-trigger-label.ph { color: var(--muted); }
    .ss-trigger-arrow { color: var(--muted); font-size: 11px; margin-left: 6px; transition: transform .2s; flex-shrink: 0; }
    .ss-container.open .ss-trigger-arrow { transform: rotate(180deg); }
    .ss-panel {
      position: absolute; top: calc(100% + 4px); left: 0; right: 0; z-index: 9999;
      background: #fff; border: 1.5px solid var(--primary); border-radius: var(--radius);
      box-shadow: 0 8px 24px rgba(0,0,0,0.13); display: none;
    }
    .ss-container.open .ss-panel { display: block; }
    .ss-search-input {
      width: 100%; padding: 8px 12px; border: none; border-bottom: 1px solid var(--border);
      background: var(--bg); font-size: 13px; outline: none; box-sizing: border-box;
      border-radius: var(--radius) var(--radius) 0 0;
    }
    .ss-options-list { max-height: 200px; overflow-y: auto; }
    .ss-option {
      padding: 8px 12px; font-size: 13px; cursor: pointer;
      transition: background .12s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .ss-option:hover { background: #eff6ff; }
    .ss-option.selected { background: #dbeafe; color: var(--primary); font-weight: 600; }
    .ss-option.ss-hidden { display: none; }
    .ss-no-results { padding: 12px; text-align: center; color: var(--muted); font-size: 13px; }
    .ss-loading-opt { padding: 12px; text-align: center; color: var(--muted); font-size: 13px; }

    /* ===== PAGINATION ===== */
    .pg-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; border-top: 1px solid var(--border);
      background: var(--bg); flex-wrap: wrap; gap: 8px;
      border-radius: 0 0 var(--radius-lg) var(--radius-lg);
    }
    .pg-info { font-size: 13px; color: var(--muted); }
    .pg-controls { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .pg-size {
      padding: 4px 8px; border: 1.5px solid var(--border); border-radius: 6px;
      background: #fff; font-size: 13px; cursor: pointer; outline: none;
    }
    .pg-size:focus { border-color: var(--primary); }
    .pg-btn {
      padding: 4px 10px; border: 1.5px solid var(--border); border-radius: 6px;
      background: #fff; cursor: pointer; font-size: 13px; line-height: 1.4;
      transition: background .15s, border-color .15s; color: var(--text);
    }
    .pg-btn:hover:not(:disabled) { background: #eff6ff; border-color: var(--primary); color: var(--primary); }
    .pg-btn:disabled { opacity: .4; cursor: not-allowed; }
    .pg-cur { font-size: 13px; color: var(--text); font-weight: 500; padding: 0 4px; }
    /* ===== APP LOADER ===== */
    #appLoader {
      position: fixed; inset: 0; z-index: 99999;
      background: var(--bg, #f8fafc);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
    }
    #appLoader .loader-spinner {
      width: 44px; height: 44px;
      border: 4px solid #e2e8f0;
      border-top-color: var(--primary, #3b82f6);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    #appLoader .loader-text {
      font-size: 14px; color: var(--muted, #64748b); font-weight: 500;
    }
    #appLoader.hidden { display: none; }
  </style>
</head>
<body>

<div id="appLoader">
  <div class="loader-spinner"></div>
  <div class="loader-text">กำลังโหลด...</div>
</div>

<div class="layout">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar" id="sidebar">

    <div class="sidebar-logo">
      <div class="logo-icon">🚌</div>
      <div>
        <div class="logo-text">Bus Tracking</div>
        <div class="logo-sub">Admin Dashboard</div>
      </div>
    </div>

    <nav class="sidebar-nav" id="sidebarNav"></nav>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-avatar" id="userAvatar">A</div>
        <div class="user-info">
          <div class="user-name" id="userName">Admin</div>
          <div class="user-role" id="userRole">admin</div>
        </div>
      </div>
    </div>

  </aside>

  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <!-- ===== MAIN ===== -->
  <div class="main">

    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()" aria-label="เปิดเมนู">
          <span></span><span></span><span></span>
        </button>
        <div>
          <div class="page-title" id="pageTitle">📊 Dashboard</div>
          <div class="page-subtitle" id="pageSubtitle">ภาพรวมระบบ Bus Tracking</div>
        </div>
      </div>
      <div class="topbar-right">
        <div class="health-badge" id="healthBadge" style="display:none">
          <span class="health-dot"></span> <span class="health-text">ระบบออนไลน์</span>
        </div>
        <button class="btn-logout" onclick="logout()">🚪 <span class="logout-text">ออกจากระบบ</span></button>
      </div>
    </header>

    <!-- Content -->
    <main class="content" id="mainContent">
      <div class="loading"><div class="spinner"></div> กำลังโหลด...</div>
    </main>

  </div><!-- end .main -->
</div><!-- end .layout -->

<!-- ===== CRUD MODAL ===== -->
<div class="modal-overlay hidden" id="crudModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">เพิ่มรายการ</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <form id="modalForm" onsubmit="return false">
        <div id="modalBody"></div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">ยกเลิก</button>
      <button class="btn btn-primary" id="modalSubmitBtn" onclick="submitModal()">💾 บันทึก</button>
    </div>
  </div>
</div>

<!-- ===== CONFIRM DELETE MODAL ===== -->
<div class="modal-overlay hidden" id="confirmModal">
  <div class="modal modal-sm">
    <div class="confirm-body">
      <div class="confirm-icon">🗑️</div>
      <h3>ยืนยันการลบ</h3>
      <p id="confirmText">คุณต้องการลบรายการนี้ใช่หรือไม่?</p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeConfirm()">ยกเลิก</button>
      <button class="btn btn-danger" id="confirmDeleteBtn" onclick="executeDelete()">🗑️ ยืนยันการลบ</button>
    </div>
  </div>
</div>

<!-- ===== TOAST ===== -->
<div id="toastContainer"></div>

<script type="module" src="script.js"></script>
</body>
</html>
